<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVIDEO | Professional Media Player</title>
    
    <!-- إضافة الفافيكون هنا -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <!-- إضافة دعم لـ favicon.png ليعمل كأيقونة في المتصفح -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- إضافة ملف الـ manifest لجعلها تطبيق ويب تقدمي (PWA) وفتحها في وضع ملء الشاشة -->
    <link rel="manifest" href="manifest.json">
    
    <!-- دعم وضع ملء الشاشة للتطبيقات المضافة إلى الشاشة الرئيسية -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505"> <!-- لون الثيم للشريط العلوي -->

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Cinzel:wght@800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --primary: #00d4ff; 
            --bg: #050505; 
            --card: #0d1117;
            --text: #ffffff; 
            --border: rgba(255,255,255,0.1);
            --gold: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* شاشة البداية ZVIDEO */
        #splash-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10001; transition: 1s ease-in-out;
        }
        .gold-text { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-main { font-family: 'Cinzel', serif; font-size: 5rem; letter-spacing: 10px; margin: 0; filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.4)); }
        .hide-splash { opacity: 0; visibility: hidden; transform: translateY(-100%); }

        /* الهيدر المتوهج */
        .header { padding: 30px; text-align: center; }
        .z-video-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem; font-weight: 900; color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            animation: lightning 1.5s infinite alternate;
        }

        /* حاوية المشغل */
        .container {
            width: 95%;
            max-width: 1100px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            margin-bottom: 50px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            border: 3px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        video { width: 100%; display: block; outline: none; transition: 0.3s; }

        /* لوحة التحكم */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: white;
            padding: 15px 10px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 5px 20px var(--primary);
            transform: translateY(-5px);
        }

        .btn-upload {
            background: var(--gold);
            color: #000 !important;
            font-weight: 900;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .btn-danger { border-color: #ff3e3e; color: #ff3e3e; }
        .btn-danger:hover { background: #ff3e3e; color: #fff; box-shadow: 0 5px 20px #ff3e3e; }

        .status-msg {
            text-align: center;
            color: var(--primary);
            font-size: 0.9rem;
            margin: 15px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* أنيميشن */
        @keyframes lightning {
            0% { text-shadow: 0 0 10px var(--primary); opacity: 0.9; }
            100% { text-shadow: 0 0 30px var(--primary), 0 0 50px #fff; opacity: 1; }
        }

        input[type="file"] { display: none; }

        /* الفلاتر */
        .f-gray { filter: grayscale(1); }
        .f-sepia { filter: sepia(1); }
        .f-bright { filter: brightness(1.5); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="logo-main gold-text">ZVIDEO</h1>
        <p class="gold-text" style="font-family: 'Great Vibes'; font-size: 2rem;">By Ziad Aldriny</p>
    </div>

    <div class="header">
        <div class="z-video-title">ZVIDEO</div>
    </div>

    <div class="container">
        <div class="video-wrapper">
            <video id="player" controls crossorigin playsinline></video>
        </div>

        <div class="status-msg" id="status">جاهز لاستقبال ملفاتك.. ZVIDEO في خدمتك</div>

        <div class="controls-grid">
            
            <label for="uploader" class="btn btn-upload">رفع فيديو جديد (All Formats) 🚀</label>
            <input type="file" id="uploader" accept="video/*,.ts,.m3u8">

            <button class="btn" onclick="step(-10)">⏪ 10ث</button>
            <button class="btn" onclick="step(10)">⏩ 10ث</button>
            <button class="btn" onclick="step(60)">⏩ دقيقة</button>

            <button class="btn" onclick="speed(0.5)">🐢 بطيء</button>
            <button class="btn" onclick="speed(1)">▶️ عادي</button>
            <button class="btn" onclick="speed(2)">⚡ سريع</button>

            <button class="btn" onclick="takeSnap()">📸 لقطة شاشة</button>
            <button class="btn" onclick="pip()">📺 شاشة عائمة</button>
            <button class="btn" onclick="full()">🖥️ ملء الشاشة</button>

            <button class="btn" onclick="filter('f-gray')">🌑 أبيض وأسود</button>
            <button class="btn" onclick="filter('f-sepia')">📜 كلاسيك</button>
            <button class="btn" onclick="filter('')">🌈 الألوان الأصلية</button>

            <button class="btn" onclick="rotate()">🔄 تدوير</button>
            <button class="btn btn-danger" onclick="clearAll()">🧹 تفريغ المشغل</button>

        </div>
    </div>

    <script>
        const video = document.getElementById('player');
        const status = document.getElementById('status');
        const uploader = document.getElementById('uploader');
        let rot = 0;

        // إخفاء الـ Splash
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hide-splash');
            }, 3000);
        });

        // تشغيل الملفات بذكاء
        uploader.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const name = file.name.toLowerCase();

            if (name.endsWith('.ts') || name.endsWith('.m3u8')) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = url;
                    video.play();
                }
            } else {
                video.src = url;
                video.play();
            }
            status.innerText = "تشغيل الآن: " + file.name;
        });

        // دوال التحكم
        function step(s) { video.currentTime += s; }
        function speed(s) { video.playbackRate = s; status.innerText = "السرعة الحالية: " + s + "x"; }
        function full() { if (video.requestFullscreen) video.requestFullscreen(); }
        function pip() { video.requestPictureInPicture(); }
        function filter(f) { video.className = f; }
        function rotate() { rot += 90; video.style.transform = `rotate(${rot}deg)`; }
        
        function takeSnap() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = 'ZVIDEO_Snapshot.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function clearAll() {
            video.src = "";
            status.innerText = "تم تفريغ المشغل.. بانتظار فيديو جديد";
            video.className = "";
            video.style.transform = "rotate(0deg)";
            rot = 0;
        }

        // دعم PWA: تسجيل Service Worker إذا كان موجوداً (اختياري للوضع الأساسي، لكن يساعد في التثبيت)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registered!', reg);
                }).catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>

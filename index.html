<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVIDEO | Professional Media Player</title>
    
    <!-- إضافة الفافيكون هنا -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <!-- إضافة دعم لـ favicon.png ليعمل كأيقونة في المتصفح -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Cinzel:wght@800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --primary: #00d4ff; 
            --bg: #050505; 
            --card: #0d1117;
            --text: #ffffff; 
            --border: rgba(255,255,255,0.1);
            --gold: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الهيدر المتوهج */
        .header { padding: 30px; text-align: center; }
        .z-video-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem; font-weight: 900; color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            animation: lightning 1.5s infinite alternate;
        }

        /* حاوية المشغل */
        .container {
            width: 95%;
            max-width: 1100px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            margin-bottom: 50px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            border: 3px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
            min-height: 200px; /* لضمان مساحة للصور */
        }

        video, img { 
            width: 100%; 
            display: block; 
            outline: none; 
            transition: 0.3s; 
            object-fit: contain; /* للصور لتتناسب */
        }

        /* لوحة التحكم */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .upload-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: white;
            padding: 15px 10px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 5px 20px var(--primary);
            transform: translateY(-5px);
        }

        .btn-upload {
            background: var(--gold);
            color: #000 !important;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .btn-danger { border-color: #ff3e3e; color: #ff3e3e; }
        .btn-danger:hover { background: #ff3e3e; color: #fff; box-shadow: 0 5px 20px #ff3e3e; }

        .status-msg {
            text-align: center;
            color: var(--primary);
            font-size: 0.9rem;
            margin: 15px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* أنيميشن */
        @keyframes lightning {
            0% { text-shadow: 0 0 10px var(--primary); opacity: 0.9; }
            100% { text-shadow: 0 0 30px var(--primary), 0 0 50px #fff; opacity: 1; }
        }

        input[type="file"] { display: none; }

        /* الفلاتر */
        .f-gray { filter: grayscale(1); }
        .f-sepia { filter: sepia(1); }
        .f-bright { filter: brightness(1.5); }

        /* إخفاء التحكمات غير المناسبة للصور */
        .video-only { display: block; }
        .image-mode .video-only { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="z-video-title">ZVIDEO</div>
    </div>

    <div class="container">
        <div class="video-wrapper" id="media-wrapper">
            <video id="video-player" controls crossorigin playsinline style="display: none;"></video>
            <img id="image-player" style="display: none;">
        </div>

        <div class="status-msg" id="status">جاهز لاستقبال ملفاتك.. ZVIDEO في خدمتك</div>

        <div class="upload-buttons">
            <label for="video-uploader" class="btn btn-upload">تشغيل فيديو 🚀</label>
            <label for="image-uploader" class="btn btn-upload">تشغيل صورة 📸</label>
        </div>
        <input type="file" id="video-uploader" accept="video/*,.ts,.m3u8">
        <input type="file" id="image-uploader" accept="image/*">

        <div class="controls-grid" id="controls">
            
            <button class="btn video-only" onclick="step(-10)">⏪ 10ث</button>
            <button class="btn video-only" onclick="step(10)">⏩ 10ث</button>
            <button class="btn video-only" onclick="step(60)">⏩ دقيقة</button>

            <button class="btn video-only" onclick="speed(0.5)">🐢 بطيء</button>
            <button class="btn video-only" onclick="speed(1)">▶️ عادي</button>
            <button class="btn video-only" onclick="speed(2)">⚡ سريع</button>

            <button class="btn" onclick="takeSnap()">📸 لقطة شاشة</button>
            <button class="btn video-only" onclick="pip()">📺 شاشة عائمة</button>
            <button class="btn" onclick="full()">🖥️ ملء الشاشة</button>

            <button class="btn" onclick="filter('f-gray')">🌑 أبيض وأسود</button>
            <button class="btn" onclick="filter('f-sepia')">📜 كلاسيك</button>
            <button class="btn" onclick="filter('')">🌈 الألوان الأصلية</button>

            <button class="btn" onclick="rotate()">🔄 تدوير</button>
            <button class="btn btn-danger" onclick="clearAll()">🧹 تفريغ المشغل</button>

        </div>
    </div>

    <script>
        const mediaWrapper = document.getElementById('media-wrapper');
        const videoPlayer = document.getElementById('video-player');
        const imagePlayer = document.getElementById('image-player');
        const status = document.getElementById('status');
        const videoUploader = document.getElementById('video-uploader');
        const imageUploader = document.getElementById('image-uploader');
        const controls = document.getElementById('controls');
        let currentPlayer = null;
        let rot = 0;
        let hls = null;

        // وظيفة لإعادة تعيين اللاعب
        function resetPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            videoPlayer.style.display = 'none';
            videoPlayer.src = '';
            imagePlayer.style.display = 'none';
            imagePlayer.src = '';
            currentPlayer = null;
            controls.classList.remove('image-mode');
            status.innerText = "جاهز لاستقبال ملفاتك.. ZVIDEO في خدمتك";
        }

        // تشغيل الفيديو
        videoUploader.addEventListener('change', function() {
            resetPlayer();
            const file = this.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const name = file.name.toLowerCase();

            videoPlayer.style.display = 'block';
            currentPlayer = videoPlayer;

            if (name.endsWith('.ts') || name.endsWith('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                } else {
                    videoPlayer.src = url;
                    videoPlayer.play();
                }
            } else {
                videoPlayer.src = url;
                videoPlayer.play();
            }
            status.innerText = "تشغيل الآن: " + file.name;
        });

        // تشغيل الصورة
        imageUploader.addEventListener('change', function() {
            resetPlayer();
            const file = this.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            imagePlayer.style.display = 'block';
            imagePlayer.src = url;
            currentPlayer = imagePlayer;
            controls.classList.add('image-mode');
            status.innerText = "عرض الآن: " + file.name;
        });

        // دوال التحكم
        function step(s) { 
            if (currentPlayer.tagName === 'VIDEO') currentPlayer.currentTime += s; 
        }
        function speed(s) { 
            if (currentPlayer.tagName === 'VIDEO') {
                currentPlayer.playbackRate = s; 
                status.innerText = "السرعة الحالية: " + s + "x"; 
            }
        }
        function full() { 
            if (currentPlayer.requestFullscreen) currentPlayer.requestFullscreen(); 
        }
        function pip() { 
            if (currentPlayer.tagName === 'VIDEO') currentPlayer.requestPictureInPicture(); 
        }
        function filter(f) { 
            if (currentPlayer) currentPlayer.className = f; 
        }
        function rotate() { 
            rot += 90; 
            if (currentPlayer) currentPlayer.style.transform = `rotate(${rot}deg)`; 
        }
        
        function takeSnap() {
            const canvas = document.createElement('canvas');
            if (currentPlayer.tagName === 'VIDEO') {
                canvas.width = currentPlayer.videoWidth;
                canvas.height = currentPlayer.videoHeight;
                canvas.getContext('2d').drawImage(currentPlayer, 0, 0);
            } else if (currentPlayer.tagName === 'IMG') {
                canvas.width = currentPlayer.naturalWidth;
                canvas.height = currentPlayer.naturalHeight;
                canvas.getContext('2d').drawImage(currentPlayer, 0, 0);
            }
            const link = document.createElement('a');
            link.download = 'ZVIDEO_Snapshot.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function clearAll() {
            resetPlayer();
            rot = 0;
        }
    </script>
</body>
</html>
